# ==============================================================================
# map_merge_HW_params.yaml
# AUSRA Hardware Map Merge — Merger Node Configuration
#
# HARDWARE FRAME NOTES:
#   world_frame is set to 'map' — the hardware SLAM TF root frame published by
#   async_slam_toolbox_node (matches hardware_full_stack.launch.py TF tree:
#   map → ausrabot_odom → ausrabot_robot_footprint → ausrabot_lidar).
#
# CRITICAL — DO NOT CHANGE init_pose_* VALUES:
#   Every init_pose_* must remain 0.0.
#   The map_expansion_node has already applied the robot's physical spawn offset
#   (robot_offset_x/y) and placed all cell data at globally-correct canvas pixels.
#   Setting init_pose_* to the spawn coordinates here would apply the offset
#   TWICE, shifting every pixel by the spawn distance a second time.
#   This produces a badly misaligned merged map with no error message.
#
#   WHERE spawn coordinates live → map_merge_hw.launch.py (ROBOT_HW_CONFIG)
#   WHERE init_pose_* lives      → here, always 0.0
# ==============================================================================

map_merge:
  ros__parameters:

    # ── Topic and namespace discovery ─────────────────────────────────────────
    # The merger subscribes to /<robot_namespace>N/<robot_map_topic>.
    # With robot_namespace='ausra_' and robot_map_topic='map_fixed', it looks for:
    #   /ausra_1/map_fixed  (real robot canvas)
    #   /ausra_2/map_fixed  (phantom canvas — all Unknown, prevents segfault)
    robot_map_topic:   map_fixed
    robot_namespace:   ausra_

    # ── Output ────────────────────────────────────────────────────────────────
    merged_map_topic:  /map_merged

    # ── Frame ID ──────────────────────────────────────────────────────────────
    # Must match the hardware TF root frame published by slam_toolbox.
    # Hardware TF tree: map → ausrabot_odom → ausrabot_robot_footprint → ausrabot_lidar
    world_frame:       map

    # ── Merge mode ────────────────────────────────────────────────────────────
    known_init_poses:  true

    # ── Timing ────────────────────────────────────────────────────────────────
    merging_rate:      1.0    # Hz — how often to publish /map_merged
    discovery_rate:    0.05   # Hz — how often to scan for new robot namespaces

    # ── Unused (known_init_poses=true bypasses feature matching) ──────────────
    estimation_rate:        0.5
    estimation_confidence:  1.0

    # ==========================================================================
    # !! INIT POSE VALUES — MUST ALL REMAIN 0.0 !!
    # ==========================================================================
    # The map_expansion_node bakes the physical spawn offset into the canvas
    # pixel positions. These values MUST be 0.0. The merger is a dumb overlay.
    # If you set these to spawn coordinates, you will see the maps offset by
    # twice the spawn distance with no error or warning message.
    # ==========================================================================

    # Robot 1 (physical robot at measured start position)
    /ausra_1/map_merge/init_pose_x:   0.0   # DO NOT CHANGE
    /ausra_1/map_merge/init_pose_y:   0.0   # DO NOT CHANGE
    /ausra_1/map_merge/init_pose_z:   0.0
    /ausra_1/map_merge/init_pose_yaw: 0.0

    # Robot 2 (phantom — all-Unknown canvas, prevents composeGrids segfault)
    /ausra_2/map_merge/init_pose_x:   0.0   # DO NOT CHANGE
    /ausra_2/map_merge/init_pose_y:   0.0   # DO NOT CHANGE
    /ausra_2/map_merge/init_pose_z:   0.0
    /ausra_2/map_merge/init_pose_yaw: 0.0
