# map_merge_swarm_params.yaml — Base Station Merger Configuration
# Matches ausra_map_merge_HW/config/map_merge_HW_params.yaml
#
# CRITICAL: init_pose_* must be 0.0 for all robots.
# The map_expansion_node bakes spawn offsets into canvas pixels.
# Setting init_pose_* to spawn coordinates doubles the shift.
#
# Init poses are injected dynamically in map_merge.launch.py.

map_merge:
  ros__parameters:
    robot_map_topic:   map_fixed
    robot_namespace:   ""
    merged_map_topic:  /map_merged
    world_frame:       map
    known_init_poses:  true
    merging_rate:      1.0
    discovery_rate:    0.05
    estimation_rate:        0.5
    estimation_confidence:  1.0
